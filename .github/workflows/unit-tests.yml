name: Unit-tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 26.1.1
      run: |
        sudo xcode-select -s /Applications/Xcode_26.1.1.app
        xcodebuild -version
        
    - name: List Available Simulators
      run: xcrun simctl list devices

    - name: Install xcbeautify
      run: brew install xcbeautify

    - name: Clear Swift Package Cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm
        rm -rf .build
        rm -rf VivaDicta.xcodeproj/project.xcworkspace/xcshareddata/swiftpm

    - name: Resolve Swift Packages
      run: |
        xcodebuild -resolvePackageDependencies \
        -workspace ./VivaDicta.xcodeproj/project.xcworkspace \
        -scheme VivaDicta

    - name: Run Tests
      run: |
        xcodebuild test -scheme VivaDicta \
        -workspace ./VivaDicta.xcodeproj/project.xcworkspace \
        -destination "platform=iOS Simulator,name=iPhone 17 Pro,OS=26.1" | xcbeautify